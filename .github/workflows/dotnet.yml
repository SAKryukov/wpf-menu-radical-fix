name: .NET Desktop Build
run-name: Build #${{ github.run_number }} # This sets the clean name on the Actions page

# on:
#  workflow_dispatch: # Controlled purely via a manual UI click

on:
  push:
    branches: [ "main" ]
  
jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write # This grants permission to create and overwrite the Release asset

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x' 

    - name: Build Project (Release)
      working-directory: ./code
      run: |
        dotnet build -c Release

    - name: Package Application Binaries (Native PowerShell)
      shell: powershell
      run: |
        Compress-Archive -Path ./code/output.AnyCPU.Release/* -DestinationPath ./Menu-controls.zip

    - name: Publish to GitHub Releases
      uses: softprops/action-gh-release@v2
      with:
        tag_name: latest
        name: Latest Development Build (.NET 10)
        body: |
          Automated compilation using clean architecture and modern solution formatting (.slnx).
        files: ./Menu-controls.zip
