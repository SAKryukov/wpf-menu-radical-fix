name: Production Application Release
run-name: Deploy-versioned ${{ github.ref_name }} # e.g., "Deploy Version v1.0.0"

on:
  workflow_dispatch:
  
jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write # Grants permission to upload the ZIP to the public release page

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x' 

    - name: Build Project (Release)
      working-directory: ./code
      run: |
        dotnet build -c Release

    - name: Package Application Binaries (Native PowerShell)
      shell: powershell
      run: |
        Compress-Archive -Path ./code/output.AnyCPU.Release/* -DestinationPath ./Menu-controls.${{ github.ref_name }}.zip

    - name: Publish Public Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: Application Release ${{ github.ref_name }}
        body: |
          ### Pre-compiled Application Binaries
          This package contains the fully built, ready-to-run desktop application. 
          
          **Instructions for users:**
          1. Download and extract **Menu-test.${{ github.ref_name }}.zip** below.
          2. Run the main executable inside the folder. No build environment required.
        draft: false
        prerelease: false
        files: ./Menu-controls.${{ github.ref_name }}.zip
