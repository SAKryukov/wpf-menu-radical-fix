name: Streamlined .NET Desktop Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/actions-dotnet@v3
      with:
        dotnet-version: '8.0.x' # Match this to your specific .NET version

    - name: Build Project (Release & Debug)
      run: |
        dotnet build -c Release
        dotnet build -c Debug

    - name: Upload Clean Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Compiled-Application-Artifacts
        path: ./Your_Custom_Output_Root/ # Set this to the root output folder from your Directory.Build.props
