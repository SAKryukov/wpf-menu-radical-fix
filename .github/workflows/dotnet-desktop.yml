name: .NET Desktop Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x' # Tailored explicitly for bleeding-edge modern features

    - name: Build Project (Release)
      working-directory: ./code
      run: |
        dotnet build -c Release

    - name: Package Application Binaries (Native PowerShell)
      shell: powershell
      run: |
        Compress-Archive -Path ./code/output.AnyCPU.Release/* -DestinationPath ./Menu-test.Release.AnyCPU.zip

    - name: Publish to GitHub Releases
      uses: softprops/action-gh-release@v2
      with:
        tag_name: latest
        name: Latest Development Build (.NET 10)
        body: |
          Automated compilation using clean architecture and modern solution formatting (.slnx).
        files: ./Menu-test.Release.AnyCPU.zip
