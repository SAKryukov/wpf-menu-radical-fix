name: .NET Desktop Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v6

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v6
      with:
        dotnet-version: '10.0.x'

    - name: Build Project (Release)
      working-directory: ./code
      run: |
        dotnet build -c Release

    - name: Package Application Binaries (Native PowerShell)
      shell: powershell
      run: |
        Compress-Archive -Path ./code/output.AnyCPU.Release/* -DestinationPath ./Menu-test.Release.AnyCPU.zip

    - name: Publish to GitHub Releases
      uses: softprops/action-gh-release@v2
      with:
        files: ./Menu-test.Release.AnyCPU.zip
